<!DOCTYPE html>
<html lang="en">
<head>
    <title>Open Street Router</title>
    <meta property="og:description"
          content="Pedestrian routing, bike routing and car routing for OpenStreetMap"/>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet'
          href='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css'/>
    <script src='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js'></script>
    <script src="https://unpkg.com/maplibre-contour@0.0.5/dist/index.min.js"></script>
    <style>
        body {
            display: flex;
            overflow: hidden;
        }

        html, body, #map {
            height: 100%;
            font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        #graph-toggle {
            position: relative;
            top: 5px;
            left: 5px;
            z-index: 1000;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .1);
            padding: 10px;
            display: flex;
            width: 28px;
            height: 28px;
            text-align: center;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            margin-bottom: 16px;
        }

        .level {
            margin-top: 4px;
            position: relative;
            top: 5px;
            left: 5px;
            z-index: 1000;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .1);
            padding: 9.5px;
            display: flex;
            width: 28px;
            height: 28px;
            text-align: center;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            font-size: 10pt;
        }

        .active {
            background: #8fff7b;
        }

        #graph-toggle:hover, .level:hover {
            background: #EEE;
        }

        .active:hover {
            background: #bdffb1;
        }

        #profile, #direction, #routing-algorithm, #foot-speed, #sidebar-toggle-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .1);
            text-align: center;
            text-decoration: none;
        }

        #direction {
            top: 48px;
        }

        #routing-algorithm {
            top: 91px;
        }

        #foot-speed {
            top: 134px;
        }

        #sidebar-toggle-btn {
            top: 177px;
        }

        #journey-info {
            color: white;
            position: absolute;
            bottom: 5px;
            left: 5px;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .1);
            text-align: center;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 4px;
        }

        .context {
            margin: 0.5em;
        }

        #sidebar {
            width: 0;
            height: 100vh;
            background: #f8f9fa;
            border-left: 1px solid #ddd;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            .action-select {
                margin-bottom: 3px;
            }
        }
        #sidebar.open {
            width: 350px;
        }

        #sidebar-content {
            min-width: 350px;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        #map-container {
            flex-grow: 1;
            position: relative;
            height: 100vh;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .kv-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-width: 400px;
            font-family: sans-serif;
        }

        .kv-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .kv-list li:last-child {
            border-bottom: none;
        }

        .kv-list .key {
            font-weight: 600;
            color: #ffffff;
        }

        .kv-list .value {
            color: #ffffff;
            text-align: right;
        }


    </style>
</head>
<body>
<div id="map-container">
    <a id="graph-toggle" href="#" onclick="toggleGraph()">G</a>
    <button id="sidebar-toggle-btn" onclick="toggleSidebar()">Test Framework</button>
    <div id="levels"></div>
    <select id="profile" onchange="selectProfile(event)">
        <option value="foot">foot</option>
        <option value="wheelchair">wheelchair</option>
        <option value="bike">bike</option>
        <option value="bike_elevation_low">bike (low elevation)</option>
        <option value="bike_elevation_high">bike (high elevation)</option>
        <option value="car" selected>car</option>
    </select>
    <select id="direction" onchange="selectDirection(event)">
        <option value="forward" selected>forward</option>
        <option value="backward">backward</option>
    </select>
    <select id="routing-algorithm" onchange="selectRoutingAlgorithm(event)">
        <option value="dijkstra" selected>dijkstra</option>
        <option value="bidirectional">bidirectional A*</option>
    </select>
    <input id="foot-speed" type="number" value="1.2" min="0.1" step="0.1"
           onchange="setSpeed(event)"/>
    <div id="journey-info">
        Test
    </div>
    <div id="map"></div>
</div>

<div id="sidebar">
    <div style="display: flex; background: #eee; border-bottom: 1px solid #ccc;">
        <button class="tab-btn active" onclick="openTab(event, 'gen-tab')"
                style="flex:1; padding: 10px; border:none; cursor:pointer;">Generate
        </button>
        <button class="tab-btn" onclick="openTab(event, 'explore-tab')"
                style="flex:1; padding: 10px; border:none; cursor:pointer;">Explore
        </button>
    </div>

    <div id="sidebar-content">
        <div id="gen-tab" class="tab-content">
            <h3>Test Case Generator</h3>
            <input type="text" id="test-name" placeholder="Test Name (e.g. right_turn)"
                   style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;">
            <select id="feed-name"
                   style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;">
                <option value="">Loading feeds...</option>
            </select>
            <hr>
            <div id="instruction-list"></div>
            <button onclick="postTestCase()"
                    style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:4px; cursor:pointer; margin-top: 20px;">
                Save
            </button>
        </div>
        <div id="explore-tab" class="tab-content" style="display:none;">
            <h3>Existing Tests</h3>
            <button onclick="loadTestsAndInject()" style="width:100%; margin-bottom:10px;">Refresh List</button>
            <div id="existing-tests-list">
                <p style="color: #666; font-style: italic;">Load tests to see them here...</p>
            </div>
        </div>
    </div>
</div>
<div id="hub-way-tooltip"
     style="position: absolute; display: none; background: #333; color: white; padding: 5px; border-radius: 4px; pointer-events: none;">
    Point Info
</div>
<script type="module">
    import {style} from "./style.js";

    window.toggleSidebar = () => {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('open');

        setTimeout(() => {
            map.resize();
        }, 310);
    };

    window.openTab = (evt, tabName) => {
        const contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";

        const buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");

        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    };

    let testCases = []
    const testNames = new Set()

    window.loadTestsFromServer = async () => {
        try {
            // You'll need a GET endpoint on your server that returns the tests.json content
            const response = await fetch(`${window.origin}/api/test-framework/test-cases`);
            const tests = await response.json();
            testCases = [...tests]

            testNames.clear()
            testCases.forEach((tc) => {
                testNames.add(tc.name)
            })
        } catch (e) {
            console.error("Failed to load tests", e);
        }
    };

    window.loadAvailableFeeds = async () => {
        try {
            const response = await fetch(`${window.origin}/api/test-framework/feeds`);
            const feeds = await response.json();
            const select = document.getElementById('feed-name');

            // Clear "Loading..." and populate
            select.innerHTML = feeds.map(file =>
                `<option value="${file}">${file}</option>`
            ).join('');
        } catch (e) {
            console.error("Failed to load feeds:", e);
            document.getElementById('osm-file-select').innerHTML = '<option>Error loading feeds</option>';
        }
    }
    window.loadAvailableFeeds();

    window.injectTestCasesIntoExploreTab = () => {
        const listDiv = document.getElementById('existing-tests-list');
        listDiv.innerHTML = '';

        testCases.forEach((t, idx) => {
            const item = document.createElement('div');
            item.style = "padding: 10px; border-bottom: 1px solid #ddd; cursor: pointer; background: #fff; margin-bottom: 5px;";
            item.innerHTML = `<strong>${t.name}</strong><br><small>${t.profile}</small>`;
            item.onclick = () => injectTestCaseIntoMap(t);
            listDiv.appendChild(item);
        });
    }

    window.loadTestsAndInject = () => {
        window.loadTestsFromServer().then(injectTestCasesIntoExploreTab);
    }

    window.injectTestCaseIntoMap = async (testCase) => {
        // Set global query state
        query.start = [testCase.start.lng, testCase.start.lat];
        query.destination = [testCase.end.lng, testCase.end.lat];
        query.profile = testCase.profile;
        query.routing = testCase.routing_algo;
        query.direction = testCase.direction;

        // Update markers
        startMarker.setLngLat(query.start);
        destinationMarker.setLngLat(query.destination);

        // Update dropdowns
        document.getElementById('profile').value = testCase.profile;

        // Trigger route update
        await updateRoute();

        // After route is loaded, manually override the sidebar selects with saved values
        const selects = document.querySelectorAll('.action-select');
        testCase.expected_actions.forEach((action, i) => {
            if (selects[i]) selects[i].value = action;
        });

        document.getElementById('test-name').value = testCase.name;
        document.getElementById('feed-name').value = testCase.osm_file;
        document.querySelector('.tab-btn').click();
    };

    const start = [8.65749737, 50.10416625]
    const destination = [8.65750757, 50.10417645];
    const query = {
        start, destination,
        max: 14400,
        profile: document.getElementById('profile').value,
        direction: document.getElementById('direction').value,
        routing: document.getElementById('routing-algorithm').value,
        footSpeed: document.getElementById('foot-speed').value
    };

    const meta = document.getElementById('journey-info');

    const instructionOptions = [
        "kNone", "kDestination", "kDestinationLeft", "kDestinationRight",
        "kBecomes", "kContinue", "kTurnSlightRight", "kTurnSlightLeft",
        "kTurnRight", "kTurnLeft", "kTurnSharpRight", "kTurnSharpLeft",
        "kTurnAround", "kRampStraight", "kRampLeft", "kRampRight",
        "kExitRight", "kExitLeft", "kStayStraight", "kStayLeft",
        "kStayRight", "kEnterRoundabout", "kExitRoundabout", "kElevator", "kStairs"
    ];

    let currentRouteData = null;

    const populateSidebar = (features) => {
        const list = document.getElementById('instruction-list');
        list.innerHTML = '';
        currentRouteData = features;

        features.forEach((f, index) => {
            if (f.geometry.type === 'LineString') {
                const div = document.createElement('div');
                div.className = 'instruction-item';

                // Map the API's numeric instruction to our string label
                const currentIdx = f.properties.instruction || 0;

                div.innerHTML = `
                <small>Segment ${index}</small>
                <select class="action-select" data-index="${index}">
                    ${instructionOptions.map((opt, i) =>
                    `<option value="${opt}" ${i === currentIdx ? 'selected' : ''}>${opt}</option>`
                ).join('')}
                </select>
            `;
                list.appendChild(div);
            }
        });
    };

    const updateRoute = async () => {
        try {
            const route = await getRoute();
            if (!route.error && route.features) {
                populateSidebar(route.features);
                map.getSource('path').setData(route);
                map.flyTo({
                    center: query.start,
                    essential: true
                });
            }
        } catch (e) {
        }
    }

    const map = new maplibregl.Map({
        container: 'map',
        center: start,
        style: {
            version: 8,
            sources: {},
            layers: [],
        },
        zoom: 18,
        transformRequest: (url, resourceType) => {
            if (url.startsWith('/')) {
                return {url: `https://europe.motis-project.de/tiles${url}`}
            }
        }
    });

    const toTable = (properties) => {
        var table = document.createElement("table");
        table.classList.add("routing-graph", "properties");
        for (var key in properties) {
            var value = properties[key];
            var row = document.createElement("tr");
            var keyCell = document.createElement("td");
            keyCell.innerText = key;
            keyCell.className = "key";
            var valueCell = document.createElement("td");
            if (key == "osm_way_id" && value != 0) {
                var osmLink = document.createElement("a");
                osmLink.href = "https://www.openstreetmap.org/way/" + Math.abs(value);
                osmLink.target = "_blank";
                osmLink.innerText = value;
                valueCell.appendChild(osmLink);
            } else if (key == "osm_relation_id" && value != 0) {
                var osmLink = document.createElement("a");
                osmLink.href =
                    "https://www.openstreetmap.org/relation/" + Math.abs(value);
                osmLink.target = "_blank";
                osmLink.innerText = value;
                valueCell.appendChild(osmLink);
            } else if (key == "osm_node_id" && value != 0) {
                var osmLink = document.createElement("a");
                osmLink.href =
                    "https://www.openstreetmap.org/node/" + Math.abs(value);
                osmLink.target = "_blank";
                osmLink.innerText = value;
                valueCell.appendChild(osmLink);
            } else {
                valueCell.innerText = value;
            }
            valueCell.className = "value";
            row.appendChild(keyCell);
            row.appendChild(valueCell);
            table.appendChild(row);
        }
        return table;
    }

    window.postTestCase = async () => {
        const testName = document.getElementById('test-name').value;
        const feedName = document.getElementById('feed-name').value;

        if (!testName) {
            alert("Please enter a test name.");
            return;
        }

        if (!feedName) {
            alert("Please provide a feed.");
            return;
        }

        if (testNames.has(testName)) {
            const proceed = confirm(`Test "${testName}" already exists. Do you want to overwrite it?`);
            if (!proceed) {
                return;
            }
        }

        const selects = document.querySelectorAll('.action-select');
        const actions = Array.from(selects).map(s => s.value);

        const testCase = {
            name: testName,
            osm_file: feedName,
            start: {
                lat: query.start[1],
                lng: query.start[0],
                lvl: query.start_level || 0
            },
            end: {
                lat: query.destination[1],
                lng: query.destination[0],
                lvl: query.destination_level || 0
            },
            profile: query.profile,
            direction: query.direction,
            routing_algo: query.routing,
            expected_actions: actions
        };

        try {
            const response = await fetch(`${window.origin}/api/test-framework/test-case`, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Access-Control-Allow-Origin': '*',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(testCase)
            });

            if (response.ok) {
                loadTestsAndInject();
                alert(`Test "${testName}" saved successfully!`);
            } else {
                const err = await response.text();
                alert("Error saving test: " + err);
            }
        } catch (e) {
            alert("Failed to reach server: " + e.message);
        }
    }

    const getHub = async (osmPrevNode, osmHubNode, osmNextNode, osmArriveWay, osmExitWay, mode) => {
        const params = new URLSearchParams();
        params.append("osm_prev_node", osmPrevNode);
        params.append("osm_hub_node", osmHubNode);
        params.append("osm_next_node", osmNextNode);
        params.append("osm_arrive_way", osmArriveWay);
        params.append("osm_exit_way", osmExitWay);
        params.append("mode", mode);
        const response = await fetch(`${window.origin}/api/test-framework/hub?${params}`, {
            method: 'GET',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
        });
        try {
            return response.json();
        } catch (e) {
            return {
                "type": "FeatureCollection",
                "metadata": {},
                "features": []
            };
        }
    };

    const getWayInstructionProperties = async (osmWay) => {
        const params = new URLSearchParams();
        params.append("way", osmWay);
        const response = await fetch(`${window.origin}/api/test-framework/instruction-properties?${params}`, {
            method: 'GET',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
        });
        try {
            return response.json();
        } catch (e) {
            return {
                "type": "FeatureCollection",
                "metadata": {},
                "features": []
            };
        }
    };

    const getRoute = async () => {
        const response = await fetch(`${window.origin}/api/route`, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                start: {
                    lat: query.start[1],
                    lng: query.start[0]
                },
                destination: {
                    lat: query.destination[1],
                    lng: query.destination[0]
                },
                profile: query.profile,
                direction: query.direction,
                max: 14400,
                routing: query.routing,
                footSpeed: parseFloat(query.footSpeed)
            })
        });
        try {
            const r = await response.json();
            const min = Math.floor(r.metadata.duration / 60);
            const sec = r.metadata.duration % 60;
            const m = Math.round(r.metadata.distance);

            meta.innerHTML = `${min} min ${sec} s<br>${m} meter`;

            if (r.features) {
                r.features = r.features.map((f, i) => {
                    f.id = i;
                    return f;
                });
                const newFeatures = [];
                for (const [index, f] of r.features.entries()) {
                    let next_segment = null;
                    if (index < r.features.length - 1) {
                        next_segment = r.features[index + 1];
                    }
                    if (f.geometry.type === 'LineString') {
                        if (index === 0) {
                            newFeatures.push({
                                type: 'Feature',
                                properties: {
                                    id: r.features.length + newFeatures.length,
                                    prevOsmNodeId: 0,
                                    prevOsmWayId: 0,
                                    osmNodeId: f.properties.segment_from,
                                    nextOsmNodeId: f.properties.segment_to,
                                    nextOsmWayId: f.properties.osm_way_id,
                                    mode: f.properties.mode
                                },
                                geometry: {
                                    type: 'Point',
                                    coordinates: f.geometry.coordinates[0]
                                }
                            });
                        }
                        newFeatures.push({
                            type: 'Feature',
                            properties: {
                                id: r.features.length + newFeatures.length,
                                prevOsmNodeId: f.properties.segment_from,
                                prevOsmWayId: f.properties.osm_way_id,
                                osmNodeId: f.properties.segment_to,
                                nextOsmNodeId: next_segment ? next_segment.properties.segment_to : 0,
                                nextOsmWayId: next_segment ? next_segment.properties.osm_way_id : 0,
                                mode: f.properties.mode
                            },
                            geometry: {
                                type: 'Point',
                                coordinates: f.geometry.coordinates[f.geometry.coordinates.length - 1]
                            }
                        });
                    }
                }
                r.features.push(...newFeatures);
            }
            return r;
        } catch (e) {
            return {
                "type": "FeatureCollection",
                "metadata": {},
                "features": []
            };
        }
    };

    const getGraph = async (bounds) => {
        const response = await fetch(`${window.origin}/api/graph`, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                level: currentLevel,
                waypoints: bounds.toArray().flat()
            })
        });
        return await response.json();
    };

    const getPlatforms = async (bounds) => {
        const response = await fetch(`${window.origin}/api/platforms`, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                level: currentLevel,
                waypoints: bounds.toArray().flat()
            })
        });
        return await response.json();
    };

    const getLevels = async (bounds) => {
        const response = await fetch(`${window.origin}/api/levels`, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                waypoints: bounds.toArray().flat()
            })
        });
        return await response.json();
    }

    let graph = false;
    let currentLevel = 0;
    const levelsDom = document.getElementById('levels');
    const setLevels = async (levels) => {
        if (levels.length === 0 && currentLevel !== 0) {
            currentLevel = 0;
            graph = false;
            style(map, 0);
            await addRouting();
            await updateGraph();
        }
        levelsDom.innerHTML = '';
        levels.forEach(l => {
            const levelLink = document.createElement('a');
            levelLink.href = '#';
            levelLink.textContent = `${l}`;
            levelLink.classList.add('level');
            levelLink.onclick = async () => {
                currentLevel = l;
                graph = false;
                style(map, l);
                await addRouting();
                await updateGraph();
            };
            levelsDom.appendChild(levelLink);
        })
    }

    const addRouting = async () => {
        map.addSource('path', {
            type: 'geojson',
            data: await getRoute()
        });
        map.addLayer({
            'id': 'path-outline',
            'type': 'line',
            'source': 'path',
            'layout': {
                'line-join': 'round',
                'line-cap': 'round',
            },
            'filter': [
                'any',
                ['!has', 'level'],
                ['==', 'level', currentLevel]
            ],
            'paint': {
                'line-color': '#1966a4',
                'line-width': 7.5,
                'line-opacity': 0.8
            }
        });
        map.addLayer({
            'id': 'path',
            'type': 'line',
            'source': 'path',
            'layout': {
                'line-join': 'round',
                'line-cap': 'round',
            },
            'filter': [
                'any',
                ['!has', 'level'],
                ['==', 'level', currentLevel]
            ],
            'paint': {
                'line-color': '#42a5f5',
                'line-width': 5,
                'line-opacity': 0.8
            }
        });
        map.addLayer({
            'id': 'path-endpoints',
            'type': 'circle',
            'source': 'path',
            'filter': [
                'all',
                ['==', '$type', 'Point'],
                [
                    'any',
                    ['!has', 'level'],
                    ['==', 'level', currentLevel]
                ]
            ],
            'paint': {
                'circle-radius': 4,
                'circle-color': '#fff',
                'circle-stroke-width': 2,
                'circle-stroke-color': '#1966a4'
            }
        });
    }

    const updateLevels = async () => {
        if (map.getZoom() < 18) {
            setLevels([]);
        } else {
            setLevels(await getLevels(map.getBounds()));
        }
    }

    map.on('load', async () => {
        style(map, 0);
        await updateLevels();
        await addRouting();
    });

    const updateGraph = async () => {
        if (!graphActive && graph) {
            graph = false;
            try {
                graphToggle.classList.remove('active');
                map.removeLayer('graph-geometry');
                map.removeLayer('graph-edge');
                map.removeLayer('graph-node');
                map.removeSource('graph');
            } catch (e) {
                // ignore, already removed
            }
        } else if (graphActive && !graph) {
            graph = true;
            graphToggle.classList.add('active');
            map.addSource('graph', {
                type: 'geojson',
                data: await getGraph(map.getBounds())
            });
            map.addSource('platform', {
                type: 'geojson',
                data: await getPlatforms(map.getBounds())
            })
            map.addLayer({
                'id': 'graph-geometry',
                'type': 'line',
                'source': 'graph',
                'filter': [
                    'all',
                    ['==', 'type', 'geometry'],
                    [
                        'any',
                        ['!has', 'level'],
                        ['==', 'level', currentLevel]
                    ]
                ],
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round',
                },
                'paint': {
                    'line-color': '#e55e5e',
                    'line-width': 3,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                'id': 'graph-edge',
                'type': 'line',
                'source': 'graph',
                'filter': [
                    'all',
                    ['==', 'type', 'edge'],
                    [
                        'any',
                        ['!has', 'level'],
                        ['==', 'level', currentLevel]
                    ]
                ],
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round',
                },
                'paint': {
                    'line-color': '#a300d9',
                    'line-width': 3
                }
            });
            map.addLayer({
                'id': 'graph-node',
                'type': 'circle',
                'source': 'graph',
                'filter': [
                    'all',
                    ['==', '$type', 'Point']
                ],
                'paint': {
                    'circle-color': [
                        'match',
                        ['get', 'label'],
                        'unreachable', '#ff1150',
                        '#11ffaf'
                    ],
                    'circle-radius': 6,
                }
            });
            map.addLayer({
                'id': 'platform-node',
                'type': 'circle',
                'source': 'platform',
                'filter': [
                    'all',
                    ['==', '$type', 'Point']
                ],
                'paint': {
                    'circle-color': '#00d9c0',
                    'circle-radius': 10,
                }
            });
            map.addLayer({
                'id': 'platform-edge',
                'type': 'line',
                'source': 'platform',
                'filter': [
                    'all',
                    ['==', 'type', 'way'],
                    [
                        'any',
                        ['!has', 'level'],
                        ['==', 'level', currentLevel]
                    ]
                ],
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round',
                },
                'paint': {
                    'line-color': '#00d9c0',
                    'line-width': 3
                }
            });
        }
    }

    const graphToggle = document.getElementById("graph-toggle");
    let graphActive = false;
    window.toggleGraph = async () => {
        graphActive = !graphActive;
        await updateGraph();
    }

    window.selectProfile = async (e) => {
        query.profile = e.target.value;
        map.getSource('path').setData(await getRoute());
    };

    window.selectDirection = async (e) => {
        query.direction = e.target.value;
        map.getSource('path').setData(await getRoute());
    }

    window.selectRoutingAlgorithm = async (e) => {
        query.routing = e.target.value;
        map.getSource('path').setData(await getRoute());
    }
    window.setSpeed = async (e) => {
        const speed = e.target.value;
        if (!speed) {
            console.log("Invalid speed")
            return;
        }
        if (speed < 0.1) {
            console.log(`Invalid speed ${speed} < 0.1`);
            const input = document.getElementById("foot-speed");
            input.value = "0.1";
            query.walkSpeed = "0.1";
        } else {
            query.footSpeed = speed;
        }
        map.getSource('path').setData(await getRoute());
    }

    map.on('moveend', async () => {
        if (graphActive) {
            map.getSource('graph').setData(await getGraph(map.getBounds()));
            map.getSource('platform').setData(await getPlatforms(map.getBounds()));
        }
        updateLevels();
    });

    ['graph-node', 'graph-edge', 'graph-geometry'].forEach((layer) => {
        map.on('click', layer, (e) => {
            new maplibregl.Popup()
                .setLngLat(e.lngLat)
                .setDOMContent(toTable(e.features[0].properties))
                .addTo(map);
            e.originalEvent.stopPropagation();
        });

        map.on('mouseenter', layer, () => {
            map.getCanvas().style.cursor = 'pointer';
        });

        map.on('mouseleave', layer, () => {
            map.getCanvas().style.cursor = '';
        });
    });



    const hoverPopup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false
    });

    map.on('mousemove', 'path', (e) => {
        map.getCanvas().style.cursor = 'pointer';
        const pathFeature = e.features[0];
        const instructionCode = pathFeature.properties.instruction;
        const osmWayId = pathFeature.properties.osm_way_id;
        const osmNodeFromId = pathFeature.properties.segment_from;
        const osmNodeToId = pathFeature.properties.segment_to;
        const actualText = instructionOptions[instructionCode] || "Unknown";

        const featureIndex = pathFeature.id || 0;

        let expectedText = "kNone";
        const matchingSelect = document.querySelector(`.action-select[data-index="${featureIndex}"]`);
        if (matchingSelect) {
            expectedText = matchingSelect.value;
        }

        const isMatch = actualText === expectedText // Simple normalization check
        const statusColor = isMatch ? '#28a745' : '#dc3545';

        hoverPopup.setLngLat(e.lngLat)
            .setHTML(`
                <div style="font-family: sans-serif; padding: 8px; line-height: 1.5; min-width: 180px;">
                    <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee; font-size: 0.85em; color: #666;">
                        <div><strong>Way ID:</strong> <code>${osmWayId}</code></div>
                        <div style="display: flex; gap: 10px; margin-top: 2px;">
                            <span><strong>From:</strong> <code>${osmNodeFromId}</code></span>
                            <span><strong>To:</strong> <code>${osmNodeToId}</code></span>
                        </div>
                    </div>

                    <div style="margin-bottom: 5px;">
                        <strong style="display: block; font-size: 0.75em; text-transform: uppercase; color: #999;">Actual</strong>
                        <code>${actualText}</code>
                    </div>
                    <div style="color: ${statusColor};">
                        <strong style="display: block; font-size: 0.75em; text-transform: uppercase; color: #999;">Expected</strong>
                        <code>${expectedText}</code>
                    </div>
                </div>
            `)
            .addTo(map);
    });

    map.on('mouseleave', 'path', () => {
        map.getCanvas().style.cursor = '';
        hoverPopup.remove();
    });

    map.on('click', 'path-endpoints', async (e) => {
        e.originalEvent.stopPropagation();

        const properties = e.features[0].properties;

        const hubMeta = await getHub(
            properties.prevOsmNodeId,
            properties.osmNodeId,
            properties.nextOsmNodeId,
            properties.prevOsmWayId,
            properties.nextOsmWayId,
            properties.mode
        );

        const popupContent = `
        <div style="font-family: ui-sans-serif, system-ui; padding: 8px;">
            <h4 style="margin: 0 0 8px 0; border-bottom: 1px solid #ccc;">Traversed Node Hub</h4>
            <p style="font-size: 11pt; margin: 4px 0;"><strong>OSM Node ID:</strong> ${properties.osmNodeId || 'N/A'}</p>
            <div style="display: flex; justify-content: center; background: #fff; border: 1px solid #ddd; border-radius: 4px; margin: 8px 0;">
                <svg id="hub-svg-${properties.id}" width="200" height="200">
                </svg>
            </div>
            <p style="font-size: 9pt; color: #888; margin-top: 8px;">
                Lat: ${e.lngLat.lat.toFixed(6)}, Lng: ${e.lngLat.lng.toFixed(6)}
            </p>
        </div>
    `;



        const popup = new maplibregl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(popupContent)
            .addTo(map);



            const svg = document.getElementById(`hub-svg-${properties.id}`);
            if (svg) {
                renderHub(svg, hubMeta);
            }

    });

    // Change cursor to pointer when hovering over a hub
    map.on('mouseenter', 'path-endpoints', () => {
        map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'path-endpoints', () => {
        map.getCanvas().style.cursor = '';
    });

    const startMarker = new maplibregl.Marker({
        draggable: true,
        color: 'green'
    })
        .setLngLat(start)
        .addTo(map)
        .on('dragend', async () => {
            const x = startMarker.getLngLat();
            query.start = [x.lng, x.lat];
            query.start_level = currentLevel;
            updateRoute();
        });

    const destinationMarker = new maplibregl.Marker({
        draggable: true,
        color: 'red'
    })
        .setLngLat(destination)
        .addTo(map)
        .on('dragend', async () => {
            const x = destinationMarker.getLngLat();
            query.destination = [x.lng, x.lat];
            query.destination_level = currentLevel;
            updateRoute();
        });

    let popup = null;
    map.on('contextmenu', (e) => {
        if (popup != null) {
            popup.remove();
        }
        popup = new maplibregl.Popup({
            anchor: 'top-left'
        });
        const x = e.lngLat;

        const actionsDiv = document.createElement('div');
        const setStart = document.createElement('a');
        setStart.classList.add('context');
        setStart.href = '#';
        setStart.innerText = "start";
        setStart.onclick = (e) => {
            startMarker.setLngLat(x);
            query.start = [x.lng, x.lat];
            query.start_level = currentLevel;
            popup.remove();
            updateRoute();
        };
        actionsDiv.appendChild(setStart);

        const setDest = document.createElement('a');
        setDest.classList.add('context');
        setDest.href = '#';
        setDest.innerText = "destination";
        setDest.onclick = (e) => {
            destinationMarker.setLngLat(x);
            query.destination = [x.lng, x.lat];
            query.destination_level = currentLevel;
            popup.remove();
            updateRoute();
        };
        actionsDiv.appendChild(setDest);

        popup
            .setLngLat(x)
            .setDOMContent(actionsDiv)
            .addTo(map);
    });

    const drawLineInSvg = (svg, x1, y1, x2, y2, color, stroke) => {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", stroke);
        svg.appendChild(line);
        return line;
    }

    const renderHub = (svg, data) => {
        const w = svg.viewBox.width || svg.width.baseVal.value;
        const h = svg.viewBox.height || svg.height.baseVal.value;
        const cx = w / 2;
        const cy = h / 2;
        const len = 70;
        const hubColor = '#4b4747'
        const pathColor = '#42a5f5';

        // Helper: Calculates XY based on the South-Arrival orientation
        // AND your "negative is right" rule.
        const getXY = (relativeAngle) => {
            const rad = ((-relativeAngle - 90) * Math.PI) / 180;
            return {
                x: cx + len * Math.cos(rad),
                y: cy + len * Math.sin(rad)
            };
        };
        const hubWayTooltip = document.getElementById('hub-way-tooltip');
        const addWaySegmentTooltip = (segment, drawnPath) => {
            drawnPath.addEventListener('mousemove', async (e) => {
                hubWayTooltip.style.display = 'block';
                // Position the tooltip near the mouse cursor
                hubWayTooltip.style.left = e.pageX + 10 + 'px';
                hubWayTooltip.style.top = e.pageY + 10 + 'px';
                const way_id = segment.way_id || segment.segment.way_id;
                const instruction_properties = await getWayInstructionProperties(way_id);
                hubWayTooltip.innerHTML =
                    `<ul class="kv-list">
                        <li>
                            <span class="key">Way</span>
                            <span class="value">${way_id}</span>
                        </li>
                        <li>
                            <span class="key">Highway</span>
                            <span class="value">${instruction_properties.highway}</span>
                        </li>
                        <li>
                            <span class="key">Junction</span>
                            <span class="value">${instruction_properties.junction}</span>
                        </li>
                        <li>
                            <span class="key">Is Link?</span>
                            <span class="value">${instruction_properties.is_link}</span>
                        </li>
                        <li>
                            <span class="key">Is crossing?</span>
                            <span class="value">${instruction_properties.is_footway_crossing}</span>
                        </li>
                        <li>
                            <span class="key">Can enter hub?</span>
                            <span class="value">${segment.can_enter_hub}</span>
                        </li>
                        <li>
                            <span class="key">Can exit hub?</span>
                            <span class="value">${segment.can_exit_hub}</span>
                        </li>
                    </ul>`;
            });

            drawnPath.addEventListener('mouseout', () => {
                hubWayTooltip.style.display = 'none';
                hubWayTooltip.innerText = '';
            });
        }

        // 1. Draw Arrival (From South to Center)
        const arrivalPath = drawLineInSvg(svg, cx, cy + len, cx, cy, pathColor, 6);
        addWaySegmentTooltip(data.arrive_hub_on, arrivalPath);

        // // 2. Draw Main Exit
        const exitPos = getXY(data.exit_angle);
        const exitPath = drawLineInSvg(svg, cx, cy, exitPos.x, exitPos.y, pathColor, 6);
        addWaySegmentTooltip(data.exit_from_hub, exitPath);

        // 3. Draw Alternatives (Relative to the Exit Angle)
        const drawAlt = (alt, color) => {
            if (alt.is_opposite_of_arrive) {
                return;
            }
            // Calculate the absolute angle relative to the arrival path
            // Absolute = Exit Direction + Relative Offset
            const absoluteAngle = data.exit_angle + alt.angle;

            const pos = getXY(absoluteAngle);

            const can_enter_hub = alt.can_enter_hub;
            const can_exit_hub = alt.can_exit_hub;

            const strokeColor = can_exit_hub ? color : (can_enter_hub ? '#d78b13' : '#ef4444');
            const altPath = drawLineInSvg(svg, cx, cy, pos.x, pos.y, strokeColor, 3);
            addWaySegmentTooltip(alt, altPath);
        };

        data.alts_left.forEach(a => drawAlt(a, '#000000'));
        data.alts_right.forEach(a => drawAlt(a, '#000000'));

        let centerDot = svg.querySelector('.center-dot');
        if (!centerDot) {
            centerDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            centerDot.setAttribute("cx", cx);
            centerDot.setAttribute("cy", cy);
            centerDot.setAttribute("r", 5);
            centerDot.setAttribute("fill", hubColor);
            centerDot.classList.add('center-dot');
            svg.appendChild(centerDot);
        }
    }
</script>
</body>
</html>
